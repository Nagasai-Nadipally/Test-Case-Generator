services:
  - type: web
    name: testgen-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      # Set this in the Render dashboard (Environment tab) — do NOT commit your real key.
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
