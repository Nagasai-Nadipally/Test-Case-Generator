services:
  testgen-ai:
    build: .
    image: testgen-ai:latest
    container_name: testgen-ai
    ports:
      - "8081:8080"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      # Must NOT include /v1 - Spring AI appends /v1/chat/completions itself.
      GROQ_BASE_URL: ${GROQ_BASE_URL:-https://api.groq.com/openai}
    restart: unless-stopped
